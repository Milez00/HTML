<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milez-Site </title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js"></script>
    <style>
        model-viewer{
            width: 100%;
    height: 70vh;
    display: block;
    background-color: #f3efe7;
        }

        .annotation {
                    background-color: #888888;
                    position: absolute;
                    transform: translate(10px, 10px);
                    border-radius: 10px;
                    padding: 10px;
                  }

                  model-viewer > .annotation {
                    transform: translate(10px, 10px);
                  }
    </style>
</head>
<body>
    
    <model-viewer 
    src="assets/dino2.glb" 
    camera-controls  
    min-camera-orbit="auto 0deg auto"
max-camera-orbit="auto 120deg auto"
shadow-intensity="1"
    ar 
    ar-modes="scene-viewer webxr">
    

    <button class="hotspot" slot="hotspot-foot" data-position="0.16 0.1 0.17" data-normal="-0.07 0.97 0.23" data-visibility-attribute="visible"></button>
                  <div class="annotation">Тестовая моделька игрушечного динозавра - фотограмметрия.</div>

</model-viewer>

</body>
</html>
