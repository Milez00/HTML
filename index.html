<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milez Site</title>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js"></script>

    <style>

        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#f3efe7;
        }

        model-viewer{
            width:100%;
            height:70vh;
            display:block;
            background:#f3efe7;
        }

        .card{

            max-width:900px;

            margin:40px auto;

            padding:35px;

            background:white;

            border-radius:15px;

            box-shadow:0 6px 18px rgba(0,0,0,.15);

            line-height:1.7;

        }

        .card h1{

            font-family:"Playfair Display", serif;
            margin-top:0;
            margin-bottom:10px;

            font-size:28px;

        }

        .card h3{

            margin-top:0;

            color:#666;

            font-weight:normal;

        }

        .card h2{

            margin-top:35px;

            color:#333;

        }

        .card p{

            color:#444;

        }

        .card ul{

            padding-left:22px;

        }

        .card li{

            margin-bottom:8px;

        }

    </style>

</head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

<body>

<model-viewer
    src="assets/dino2.glb"
    camera-controls
    shadow-intensity="1"
    min-camera-orbit="auto 0deg auto"
    max-camera-orbit="auto 120deg auto"
    ar
    ar-modes="scene-viewer webxr">

</model-viewer>


<div class="card">

    <h1>Игрушечный динозавр</h1>
    
    <ul>
        <li>Модель создана методом фотограмметрии.</li>
        <li>Оптимизирована для WebGL.</li>
        <li>Поддерживает просмотр в дополненной реальности (AR).</li>
            </ul>

    

</div>

</body>
</html>
