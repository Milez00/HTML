<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milez-Site </title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js"></script>
    <style>
        model-viewer{
            width: 100%;
    height: 70vh;
    display: block;
    background-color: #f3efe7;
        }
    </style>
</head>
<body>
    <h1> Бей петуха, Вова! А динозавриков не трогать...</h1>
    <model-viewer 
    src="assets/dino2.glb" 
    camera-controls  
    min-camera-orbit="auto 0deg auto"
max-camera-orbit="auto 120deg auto"
shadow-intensity="1"
    ar 
    ar-modes="scene-viewer webxr">
    
    <button class="Hotspot" slot="hotspot-2" data-position="-0.05059166288950919m 0.14944133592562625m -0.006630579315794584m" data-normal="-0.02965805067794053m -0.2772614529782122m -0.960336652805877m" data-visibility-attribute="visible">
        <div class="HotspotAnnotation">Гребешок</div>
    </button><button class="Hotspot" slot="hotspot-3" data-position="0.07084744859887493m 0.06837916003895964m -0.01882635125562226m" data-normal="-0.005517261333138457m -0.06698202273077633m 0.9977389280058566m" data-visibility-attribute="visible">
        <div class="HotspotAnnotation">Острый, острый коготок</div>
    </button>

</model-viewer>

</body>
</html>
